name: BodyLife CRM CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  quality-gate:
    name: Build, analyzers, tests, and PostgreSQL migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bodylife
          POSTGRES_PASSWORD: bodylife_test_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bodylife -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BODYLIFE_TEST_POSTGRES_ADMIN_CONNECTION_STRING: Host=localhost;Port=5432;Database=postgres;Username=bodylife;Password=bodylife_test_password

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run validation gate
        run: ./scripts/validate.sh
