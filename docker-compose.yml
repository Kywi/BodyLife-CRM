name: bodylife-crm

services:
  postgres:
    image: postgres:17
    container_name: bodylife-crm-postgres
    environment:
      POSTGRES_DB: ${BODYLIFE_POSTGRES_DB:-bodylife_crm_dev}
      POSTGRES_USER: ${BODYLIFE_POSTGRES_USER:-bodylife}
      POSTGRES_PASSWORD: ${BODYLIFE_POSTGRES_PASSWORD:-bodylife_dev_password}
    ports:
      - "${BODYLIFE_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - bodylife_postgres_data:/var/lib/postgresql/data

volumes:
  bodylife_postgres_data:
